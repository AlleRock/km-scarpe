<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tracker Scarpe</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tracker Scarpe">
    <link rel="apple-touch-icon" href="icona.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #FF4D1C;
            --accent-soft: rgba(255, 77, 28, 0.12);
            --bg: #F5F3EF;
            --card: #FFFFFF;
            --text: #1A1A1A;
            --muted: #888880;
            --border: #E8E6E1;
            --danger: #FF3B30;
            --safe: #34C759;
            --warn: #FF9500;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0F0F0D;
                --card: #1C1C1A;
                --text: #F5F3EF;
                --muted: #6B6B63;
                --border: #2C2C2A;
                --accent-soft: rgba(255, 77, 28, 0.15);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            padding: env(safe-area-inset-top, 20px) 16px calc(env(safe-area-inset-bottom, 0px) + 20px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* HEADER */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0 8px;
        }
        .app-header h1 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .settings-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.15s;
            padding: 0;
        }
        .settings-btn:active { opacity: 0.6; }

        /* CARD PRINCIPALE */
        .main-card {
            background: var(--card);
            border-radius: 20px;
            padding: 24px 20px 20px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .main-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), #FF8C42);
            border-radius: 20px 20px 0 0;
            transition: opacity 0.3s;
        }
        .main-card.warning::before {
            background: linear-gradient(90deg, var(--danger), #FF6B6B);
            animation: pulse-bar 1.5s ease-in-out infinite;
        }

        @keyframes pulse-bar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .shoe-label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .km-display {
            font-family: 'DM Mono', monospace;
            font-size: 4.5rem;
            font-weight: 500;
            color: var(--text);
            line-height: 1;
            letter-spacing: -2px;
            margin: 8px 0;
            transition: color 0.3s;
        }
        .km-display .unit {
            font-size: 1.2rem;
            font-weight: 400;
            color: var(--muted);
            letter-spacing: 0;
            margin-left: 4px;
        }
        .km-display.danger { color: var(--danger); }

        /* PROGRESS BAR */
        .progress-wrap {
            margin: 12px 0 4px;
        }
        .progress-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            color: var(--muted);
            margin-bottom: 6px;
            font-weight: 500;
        }
        .progress-track {
            background: var(--border);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s;
            background: var(--accent);
        }
        .progress-fill.mid { background: var(--warn); }
        .progress-fill.full { background: var(--danger); }

        /* ALERT */
        .alert-box {
            display: none;
            margin-top: 14px;
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.3);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--danger);
            text-align: center;
        }
        .alert-box.show { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* FORM */
        .input-row {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        input[type="number"] {
            flex: 1;
            height: 50px;
            padding: 0 14px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            font-size: 1.05rem;
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--text);
            -webkit-appearance: none;
            transition: border-color 0.2s;
            outline: none;
        }
        input[type="number"]:focus { border-color: var(--accent); }

        .add-btn {
            height: 50px;
            padding: 0 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.15s, transform 0.1s;
            font-family: 'DM Sans', sans-serif;
        }
        .add-btn:active { opacity: 0.8; transform: scale(0.97); }

        /* STATS MINI */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }
        .stat-chip {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 10px;
            text-align: center;
        }
        .stat-chip .val {
            font-family: 'DM Mono', monospace;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text);
            display: block;
        }
        .stat-chip .lbl {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-top: 2px;
            display: block;
        }

        /* STORIA */
        .section-label {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 0 4px;
        }

        .history-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }
        .empty-state {
            padding: 32px 20px;
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
        }
        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 13px 16px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            animation: fadeIn 0.25s ease;
        }
        .history-item:last-child { border-bottom: none; }

        .item-left { display: flex; flex-direction: column; gap: 2px; }
        .item-date {
            font-size: 0.82rem;
            color: var(--muted);
            font-weight: 500;
        }
        .item-km {
            font-family: 'DM Mono', monospace;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text);
        }
        .item-km span { font-size: 0.8rem; color: var(--muted); }

        .del-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            width: 30px;
            height: 30px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
            padding: 0;
            flex-shrink: 0;
        }
        .del-btn:active { background: rgba(255,59,48,0.1); border-color: var(--danger); color: var(--danger); }

        /* RESET */
        .reset-btn {
            background: none;
            color: var(--danger);
            border: 1px solid rgba(255,59,48,0.3);
            border-radius: 14px;
            padding: 14px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.15s;
            width: 100%;
        }
        .reset-btn:active { background: rgba(255,59,48,0.08); }

        /* MODAL IMPOSTAZIONI */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            align-items: flex-end;
            justify-content: center;
            padding: 0 0 env(safe-area-inset-bottom, 0px);
        }
        .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }
        .modal {
            background: var(--card);
            border-radius: 24px 24px 0 0;
            padding: 20px 20px 32px;
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .modal-handle {
            width: 36px; height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 20px;
        }
        .modal h2 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .modal label {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            display: block;
            margin-bottom: 6px;
        }
        .modal input[type="number"] {
            width: 100%;
            margin-bottom: 16px;
        }
        .modal-actions { display: flex; gap: 8px; }
        .btn-cancel {
            flex: 1; height: 50px;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: opacity 0.15s;
        }
        .btn-save-modal {
            flex: 1; height: 50px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: opacity 0.15s;
        }
        .btn-cancel:active, .btn-save-modal:active { opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">

    <div class="app-header">
        <h1>🥾 Maisciùs</h1>
        <button class="settings-btn" onclick="openSettings()" title="Impostazioni">⚙️</button>
    </div>

    <!-- CARD PRINCIPALE -->
    <div class="main-card" id="mainCard">
        <div class="shoe-label" id="shoeName">SCARPA ATTIVA</div>
        <div class="km-display" id="totalDisplay">
            0<span class="unit">km</span>
        </div>

        <div class="progress-wrap">
            <div class="progress-meta">
                <span>Usura</span>
                <span id="progressLabel">0 / 500 km</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>
        </div>

        <div class="alert-box" id="alertBox">⚠️ È ora di cambiare le scarpe!</div>

        <div class="input-row">
            <input type="number" id="kmInput" placeholder="KM oggi" step="0.1" inputmode="decimal">
            <button class="add-btn" onclick="addKm()">+ Aggiungi</button>
        </div>
    </div>

    <!-- STATISTICHE -->
    <div class="stats-row">
        <div class="stat-chip">
            <span class="val" id="statCorse">0</span>
            <span class="lbl">Corse</span>
        </div>
        <div class="stat-chip">
            <span class="val" id="statMedia">0.0</span>
            <span class="lbl">Media km</span>
        </div>
        <div class="stat-chip">
            <span class="val" id="statRimasti">500</span>
            <span class="lbl">Km rimasti</span>
        </div>
    </div>

    <!-- STORICO -->
    <div class="section-label">Storico corse</div>
    <div class="history-card" id="historyList"></div>

    <button class="reset-btn" onclick="resetData()">🗑 Resetta tutto lo storico</button>

</div>

<!-- MODAL IMPOSTAZIONI -->
<div class="modal-overlay" id="settingsModal" onclick="closeOnOverlay(event)">
    <div class="modal">
        <div class="modal-handle"></div>
        <h2>⚙️ Impostazioni</h2>

        <label>Nome scarpa</label>
        <input type="text" id="settingName" placeholder="es. Nike Vomero 17" style="height:50px; padding:0 14px; border:1.5px solid var(--border); border-radius:14px; font-size:1rem; background:var(--bg); color:var(--text); width:100%; margin-bottom:16px; -webkit-appearance:none; outline:none; font-family:'DM Sans',sans-serif;">

        <label>Target sostituzione (km)</label>
        <input type="number" id="settingTarget" placeholder="500" inputmode="numeric">

        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeSettings()">Annulla</button>
            <button class="btn-save-modal" onclick="saveSettings()">Salva</button>
        </div>
    </div>
</div>

<script>
    // ─── STATO ───────────────────────────────────────────
    const STORAGE_KEY = 'trackerScarpe_v2';

    function caricaDati() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : datiDefault();
        } catch {
            return datiDefault();
        }
    }

    function datiDefault() {
        return { nomeScarpa: 'Scarpa attiva', targetKm: 500, storico: [] };
    }

    function salvaDati() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(stato));
    }

    // Il totale viene sempre ricalcolato dallo storico (mai tenuto separato)
    function calcolaTotale() {
        return stato.storico.reduce((sum, entry) => sum + entry.km, 0);
    }

    let stato = caricaDati();

    // ─── UI ──────────────────────────────────────────────
    function aggiorna() {
        const totale = calcolaTotale();
        const target = stato.targetKm;
        const rimasti = Math.max(0, target - totale);
        const pct = Math.min(100, (totale / target) * 100);
        const nCorse = stato.storico.length;
        const media = nCorse > 0 ? totale / nCorse : 0;

        // Numero principale
        document.getElementById('totalDisplay').innerHTML =
            `${totale.toFixed(1)}<span class="unit">km</span>`;

        // Nome scarpa
        document.getElementById('shoeName').textContent = stato.nomeScarpa.toUpperCase();

        // Progress bar
        const fill = document.getElementById('progressFill');
        fill.style.width = pct + '%';
        fill.className = 'progress-fill' + (pct >= 100 ? ' full' : pct >= 70 ? ' mid' : '');
        document.getElementById('progressLabel').textContent =
            `${totale.toFixed(0)} / ${target} km`;

        // Alert
        const alertBox = document.getElementById('alertBox');
        const mainCard = document.getElementById('mainCard');
        if (totale >= target) {
            alertBox.classList.add('show');
            mainCard.classList.add('warning');
            document.getElementById('totalDisplay').classList.add('danger');
        } else {
            alertBox.classList.remove('show');
            mainCard.classList.remove('warning');
            document.getElementById('totalDisplay').classList.remove('danger');
        }

        // Stats
        document.getElementById('statCorse').textContent = nCorse;
        document.getElementById('statMedia').textContent = media.toFixed(1);
        document.getElementById('statRimasti').textContent = rimasti.toFixed(0);

        // Storico
        disegnaStorico();
    }

    function disegnaStorico() {
        const container = document.getElementById('historyList');
        const lista = [...stato.storico].reverse();

        if (lista.length === 0) {
            container.innerHTML = '<div class="empty-state">Nessuna corsa registrata ancora</div>';
            return;
        }

        container.innerHTML = lista.map(entry => `
            <div class="history-item">
                <div class="item-left">
                    <span class="item-date">${entry.data}</span>
                    <span class="item-km">+${entry.km.toFixed(1)}<span> km</span></span>
                </div>
                <button class="del-btn" onclick="eliminaCorsa(${entry.id})" title="Elimina">✕</button>
            </div>
        `).join('');
    }

    // ─── AZIONI ──────────────────────────────────────────
    function addKm() {
        const input = document.getElementById('kmInput');
        const km = parseFloat(input.value);

        if (isNaN(km) || km <= 0) {
            input.focus();
            input.style.borderColor = 'var(--danger)';
            setTimeout(() => input.style.borderColor = '', 800);
            return;
        }

        const ora = new Date();
        const dataStr = ora.toLocaleDateString('it-IT', {
            day: '2-digit', month: 'short', year: 'numeric'
        });

        stato.storico.push({ id: Date.now(), km, data: dataStr });
        salvaDati();
        input.value = '';
        input.blur();
        aggiorna();
    }

    function eliminaCorsa(id) {
        stato.storico = stato.storico.filter(e => e.id !== id);
        salvaDati();
        aggiorna();
    }

    function resetData() {
        if (confirm('Cancellare tutto lo storico? Questa azione è irreversibile.')) {
            stato.storico = [];
            salvaDati();
            aggiorna();
        }
    }

    // ─── IMPOSTAZIONI ────────────────────────────────────
    function openSettings() {
        document.getElementById('settingName').value = stato.nomeScarpa;
        document.getElementById('settingTarget').value = stato.targetKm;
        document.getElementById('settingsModal').classList.add('open');
    }

    function closeSettings() {
        document.getElementById('settingsModal').classList.remove('open');
    }

    function closeOnOverlay(e) {
        if (e.target === document.getElementById('settingsModal')) closeSettings();
    }

    function saveSettings() {
        const nome = document.getElementById('settingName').value.trim();
        const target = parseInt(document.getElementById('settingTarget').value);

        if (nome) stato.nomeScarpa = nome;
        if (!isNaN(target) && target > 0) stato.targetKm = target;

        salvaDati();
        closeSettings();
        aggiorna();
    }

    // Invio con tasto Enter
    document.getElementById('kmInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') addKm();
    });

    // ─── INIT ─────────────────────────────────────────────
    aggiorna();
</script>
</body>
</html>
